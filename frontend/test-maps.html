<!DOCTYPE html>
<html>
<head>
    <title>Test Google Maps</title>
    <style>
        #map {
            height: 100vh;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        function initMap() {
            const map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 18.493343843257275, lng: 74.02357135415613 },
                zoom: 16,
            });
            console.log("Map loaded successfully!");
        }
        
        window.initMap = initMap;
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBeuVPCsXTvznBfbPplXLTm46WNXK6PiT4&callback=initMap&libraries=places,marker" async defer></script>
</body>
</html>
